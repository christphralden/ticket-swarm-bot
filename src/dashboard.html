<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>TICKET BOT</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0d0d0d;
      --surface:      #111111;
      --surface-2:    #141414;
      --border:       #1c1c1c;
      --border-hi:    #2a2a2a;
      --text:         #a8a8a8;
      --text-dim:     #666;
      --text-muted:   #999;
      --text-hi:      #d8d8d8;
      --green:        #00ff88;
      --green-dim:    #00cc66;
      --amber:        #f0a500;
      --blue:         #4db8ff;
      --red:          #ff4444;
      --cyan:         #00d4ff;
      --yellow:       #ffc947;
      --font:         Consolas, 'Courier New', 'Liberation Mono', monospace;
      --sz:           12px;
      --header-h:     44px;
      --ctrl-h:       44px;
      --sum-h:        28px;
      --log-h:        215px;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: var(--sz);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      line-height: 1.4;
    }

    /* ── Scanline overlay ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent 0px,
        transparent 2px,
        rgba(0,0,0,0.035) 2px,
        rgba(0,0,0,0.035) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* ── Checkout alert ── */
    #checkout-alert {
      display: none;
      flex-shrink: 0;
      height: 34px;
      line-height: 34px;
      padding: 0 16px;
      background: #001208;
      border-bottom: 1px solid var(--green);
      color: var(--green);
      font-size: 11px;
      letter-spacing: 0.12em;
      font-weight: bold;
      animation: alertFlash 0.9s ease-in-out infinite;
    }
    @keyframes alertFlash {
      0%, 100% { background: #001208; }
      50%       { background: #002514; }
    }

    /* ── Header ── */
    .hdr {
      height: var(--header-h);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border-hi);
    }
    .hdr-left { display: flex; align-items: center; gap: 10px; }
    .logo {
      color: var(--green);
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 0.22em;
      text-shadow: 0 0 10px rgba(0,255,136,0.35);
    }
    .hdr-sep  { color: var(--border-hi); }
    .hdr-sub  { color: var(--text-muted); font-size: 10px; letter-spacing: 0.18em; }

    /* WS indicator */
    .ws-ind {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--text-dim);
    }
    .ws-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-dim);
    }
    .ws-ind.connected    { color: var(--green); }
    .ws-ind.connected    .ws-dot { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .ws-ind.reconnecting { color: var(--amber); }
    .ws-ind.reconnecting .ws-dot { background: var(--amber); animation: blink 0.9s step-end infinite; }
    .ws-ind.disconnected { color: var(--red); }
    .ws-ind.disconnected .ws-dot { background: var(--red); }
    @keyframes blink { 50% { opacity: 0; } }

    /* ── Controls bar ── */
    .ctrl-bar {
      height: var(--ctrl-h);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 6px;
      background: var(--surface-2);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      white-space: nowrap;
    }
    .ctrl-sep { color: var(--border-hi); padding: 0 3px; flex-shrink: 0; }

    /* ── Summary bar ── */
    .sum-bar {
      height: var(--sum-h);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .sum-label { font-size: 10px; letter-spacing: 0.12em; color: var(--text-dim); flex-shrink: 0; }
    #summary   { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .sum-sep   { color: var(--border-hi); }
    .no-workers { color: var(--text-dim); font-size: 11px; }

    /* ── Buttons ── */
    button {
      background: var(--surface-2);
      border: 1px solid var(--border-hi);
      color: var(--text);
      font-family: var(--font);
      font-size: 11px;
      padding: 5px 10px;
      cursor: pointer;
      letter-spacing: 0.06em;
      transition: background 0.1s, border-color 0.1s, color 0.1s;
      white-space: nowrap;
      flex-shrink: 0;
      outline: none;
    }
    button:hover  { background: #1c1c1c; border-color: #3a3a3a; color: var(--text-hi); }
    button:active { background: #222; }
    .btn-primary  { border-color: #1a5c3a; color: var(--green-dim); }
    .btn-primary:hover { background: rgba(0,204,102,0.08); border-color: var(--green-dim); color: var(--green); }
    .btn-danger   { border-color: rgba(255,68,68,0.25); color: #884444; }
    .btn-danger:hover { background: rgba(255,68,68,0.08); border-color: rgba(255,68,68,0.6); color: var(--red); }
    .btn-sm       { font-size: 10px; padding: 2px 8px; }

    /* ── Inputs ── */
    input {
      background: var(--bg);
      border: 1px solid var(--border-hi);
      color: var(--text-hi);
      font-family: var(--font);
      font-size: 11px;
      padding: 5px 8px;
      outline: none;
      flex-shrink: 0;
    }
    input:focus { border-color: #3a3a3a; }
    input::placeholder { color: var(--text-dim); }
    #spawn-count { width: 52px; }
    #spawn-url   { width: 200px; }

    /* ── Worker table ── */
    .tbl-wrap {
      flex: 1;
      min-height: 60px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #252525 var(--bg);
    }
    .tbl-wrap::-webkit-scrollbar       { width: 5px; }
    .tbl-wrap::-webkit-scrollbar-track { background: var(--bg); }
    .tbl-wrap::-webkit-scrollbar-thumb { background: #252525; }

    .wtable {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }
    .wtable thead {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #111111;
    }
    .wtable th {
      text-align: left;
      padding: 7px 10px;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      border-bottom: 1px solid var(--border-hi);
      font-weight: normal;
    }
    .wtable td {
      padding: 6px 10px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text);
    }
    .wtable tbody tr:hover td { background: rgba(255,255,255,0.018); }

    /* col widths */
    .wtable th:nth-child(1), .wtable td:nth-child(1) { width: 38px; color: var(--text-dim); }
    .wtable th:nth-child(2), .wtable td:nth-child(2) { width: 155px; }
    .wtable th:nth-child(3), .wtable td:nth-child(3) { width: 180px; font-size: 11px; color: var(--text-muted); }
    .wtable th:nth-child(4), .wtable td:nth-child(4) { width: 180px; font-size: 11px; color: var(--text-muted); }
    .wtable th:nth-child(5), .wtable td:nth-child(5) { width: 160px; font-size: 11px; color: var(--text-muted); }
    .wtable th:nth-child(6), .wtable td:nth-child(6) { width: 140px; font-size: 11px; }
    .wtable th:nth-child(7), .wtable td:nth-child(7) { width: 80px;  font-size: 11px; color: var(--text-muted); }
    .wtable th:nth-child(8), .wtable td:nth-child(8) { width: auto; }

    /* row states */
    .row-error    td { background: rgba(255,68,68,0.04) !important; }
    .row-error:hover td { background: rgba(255,68,68,0.07) !important; }
    .row-checkout td { animation: checkoutRow 1.1s ease-in-out infinite; }
    @keyframes checkoutRow {
      0%, 100% { background: rgba(0,255,136,0.04); }
      50%       { background: rgba(0,255,136,0.11); }
    }

    /* state badge */
    .sbadge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      letter-spacing: 0.04em;
    }
    .sbadge.pulsing { animation: statePulse 1.3s ease-in-out infinite; }
    @keyframes statePulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.45; } }

    /* spinner */
    .spin {
      display: inline-block;
      width: 8px;
      height: 8px;
      border: 1.5px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* action buttons */
    .acts { display: flex; gap: 3px; }
    .acts button { font-size: 10px; padding: 2px 7px; }

    /* empty */
    .empty-td {
      text-align: center;
      padding: 44px 0 !important;
      color: var(--text-dim);
      font-size: 11px;
      letter-spacing: 0.07em;
    }

    /* ── Log section ── */
    .log-section {
      flex-shrink: 0;
      height: var(--log-h);
      display: flex;
      flex-direction: column;
      background: #0a0a0a;
      border-top: 1px solid var(--border-hi);
    }
    .log-hdr {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 4px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .log-title { font-size: 10px; letter-spacing: 0.12em; color: var(--text-dim); }
    #log-count { flex: 1; font-size: 10px; color: var(--text-dim); }
    .log-panel {
      flex: 1;
      overflow-y: auto;
      padding: 5px 12px 6px;
      scrollbar-width: thin;
      scrollbar-color: #1c1c1c #0a0a0a;
    }
    .log-panel::-webkit-scrollbar       { width: 5px; }
    .log-panel::-webkit-scrollbar-track { background: #0a0a0a; }
    .log-panel::-webkit-scrollbar-thumb { background: #1c1c1c; }
    .log-line { font-size: 11px; line-height: 1.7; white-space: pre-wrap; word-break: break-all; }
    .lt  { color: #2e2e2e; }
    .lsw { color: var(--cyan); }
    .lss { color: var(--yellow); }
    .lm  { color: #7a7a7a; }

    /* ── Config ── */
    .cfg-section {
      flex-shrink: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }
    .cfg-section summary {
      padding: 5px 12px;
      cursor: pointer;
      font-size: 10px;
      letter-spacing: 0.12em;
      color: var(--text-dim);
      user-select: none;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 6px;
      outline: none;
    }
    .cfg-section summary::-webkit-details-marker { display: none; }
    .cfg-section summary::before { content: '+'; transition: 0.15s; }
    .cfg-section[open] summary::before { content: '-'; }
    .cfg-body { padding: 0 12px 10px; display: flex; flex-direction: column; gap: 7px; }
    .cfg-acts { display: flex; gap: 6px; }
    .cfg-ta {
      background: var(--bg);
      border: 1px solid var(--border-hi);
      color: var(--text);
      font-family: var(--font);
      font-size: 11px;
      padding: 8px;
      resize: vertical;
      outline: none;
      width: 100%;
      max-height: 220px;
    }
    .cfg-ta:focus { border-color: #3a3a3a; }
  </style>
</head>
<body>

  <div id="checkout-alert"></div>

  <header class="hdr">
    <div class="hdr-left">
      <span class="logo">TICKET BOT</span>
      <span class="hdr-sep">//</span>
      <span class="hdr-sub">CONTROL PANEL</span>
    </div>
    <span id="ws-ind" class="ws-ind disconnected">
      <span class="ws-dot"></span>
      <span id="ws-txt">DISCONNECTED</span>
    </span>
  </header>

  <div class="ctrl-bar">
    <button class="btn-primary" onclick="spawnAll()">SPAWN ALL</button>
    <span class="ctrl-sep">|</span>
    <input id="spawn-count" type="number" min="1" value="1" title="worker count">
    <input id="spawn-url"   type="text" placeholder="target url (optional)">
    <button onclick="spawnN()">SPAWN N</button>
    <span class="ctrl-sep">|</span>
    <button onclick="cmdAll('START')">START ALL</button>
    <button onclick="cmdAll('STOP')">STOP ALL</button>
    <button onclick="cmdAll('REFRESH')">REFRESH ALL</button>
  </div>

  <div class="sum-bar">
    <span class="sum-label">STATUS</span>
    <div id="summary"><span class="no-workers">no workers</span></div>
  </div>

  <div class="tbl-wrap">
    <table class="wtable">
      <thead>
        <tr>
          <th>ID</th>
          <th>STATE</th>
          <th>TARGET</th>
          <th>CURRENT URL</th>
          <th>FOCUS</th>
          <th>LAST REQ</th>
          <th>PROXY</th>
          <th>ACTIONS</th>
        </tr>
      </thead>
      <tbody id="wtbody">
        <tr id="empty-row"><td class="empty-td" colspan="8">no workers spawned — click SPAWN ALL to begin</td></tr>
      </tbody>
    </table>
  </div>

  <div class="log-section">
    <div class="log-hdr">
      <span class="log-title">LOGS</span>
      <span id="log-count"></span>
      <button class="btn-sm" onclick="clearLogs()">CLEAR</button>
    </div>
    <div id="log-panel" class="log-panel"></div>
  </div>

  <details class="cfg-section">
    <summary>CONFIG</summary>
    <div class="cfg-body">
      <div class="cfg-acts">
        <button onclick="loadConfig()">LOAD</button>
        <button onclick="saveConfig()">SAVE</button>
      </div>
      <textarea id="cfg-ta" class="cfg-ta" rows="10" spellcheck="false"></textarea>
    </div>
  </details>

  <script>
    /* ── State colors ── */
    const SC = {
      UNSPAWNED:    '#444',
      IDLE:         '#888',
      NAVIGATING:   '#aaa',
      RELOADING:    '#4db8ff',
      PRE_QUEUE:    '#f0a500',
      WAITING_ROOM: '#f0a500',
      IN_QUEUE:     '#f0a500',
      ACTIVE_SALE:  '#00cc66',
      CHECKOUT:     '#00ff88',
      DONE:         '#00ff88',
      SOLD_OUT:     '#ff4444',
      ERROR:        '#ff4444',
    };
    const SPINNER_STATES  = new Set(['NAVIGATING', 'RELOADING']);
    const PULSE_STATES    = new Set(['ACTIVE_SALE']);
    const CHECKOUT_STATES = new Set(['CHECKOUT', 'DONE']);
    const ERROR_STATES    = new Set(['ERROR', 'SOLD_OUT']);

    const workers = new Map();
    let logTotal  = 0;

    /* ── WebSocket ── */
    let ws = null;
    let delay = 1000;

    function connect() {
      setWs('reconnecting');
      try { ws = new WebSocket(`ws://${window.location.hostname}:__WS_PORT__`); } catch { sched(); return; }
      ws.onopen    = () => { setWs('connected'); delay = 1000; };
      ws.onmessage = (e) => { try { handle(JSON.parse(e.data)); } catch {} };
      ws.onclose   = ws.onerror = () => { setWs('disconnected'); sched(); };
    }
    function sched() {
      setWs('reconnecting');
      setTimeout(connect, delay);
      delay = Math.min(delay * 2, 10000);
    }
    function setWs(state) {
      const el  = document.getElementById('ws-ind');
      const txt = document.getElementById('ws-txt');
      el.className = 'ws-ind ' + state;
      txt.textContent = state.toUpperCase();
    }
    function send(payload) {
      if (ws && ws.readyState === 1) ws.send(JSON.stringify(payload));
    }

    /* ── Message handler ── */
    function handle(msg) {
      if (msg.type === 'snapshot') {
        workers.clear();
        resetTable();
        msg.workers.forEach(w => { workers.set(w.id, w); upsertRow(w); });
        logTotal = 0;
        document.getElementById('log-panel').innerHTML = '';
        msg.logs.forEach(addLog);
      } else if (msg.type === 'worker') {
        workers.set(msg.status.id, msg.status);
        upsertRow(msg.status);
      } else if (msg.type === 'removed') {
        workers.delete(msg.id);
        removeRow(msg.id);
      } else if (msg.type === 'log') {
        addLog(msg.entry);
      }
      renderSummary();
      renderAlerts();
    }

    /* ── Utilities ── */
    function esc(s) {
      return String(s || '')
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function trunc(s, n) {
      s = s || '';
      return s.length > n ? s.slice(0, n - 1) + '…' : s;
    }
    function hhmm(ts) {
      const d = new Date(ts);
      return [d.getHours(), d.getMinutes(), d.getSeconds()]
        .map(n => String(n).padStart(2,'0')).join(':');
    }

    /* ── Table ── */
    function stateBadge(state) {
      const color = SC[state] || '#888';
      const spin  = SPINNER_STATES.has(state)  ? '<span class="spin"></span>' : '';
      const cls   = PULSE_STATES.has(state)     ? 'sbadge pulsing' : 'sbadge';
      return `<span class="${cls}" style="color:${color}">${spin}${state}</span>`;
    }

    function netBadge(net) {
      if (!net) return '<span style="color:#444">—</span>';
      const c = net.status >= 500 ? '#ff4444' : net.status >= 400 ? '#f0a500' : net.status >= 300 ? '#4db8ff' : '#00cc66';
      const raw = net.url.replace(/^https?:\/\/[^/]+/, '') || net.url;
      const u = trunc(raw, 22);
      return `<span style="color:${c}">${net.status}</span> <span style="color:#666">${esc(u)}</span>`;
    }

    function rowHtml(w) {
      const isErr      = ERROR_STATES.has(w.state);
      const isCheckout = CHECKOUT_STATES.has(w.state);
      const cls        = isCheckout ? 'row-checkout' : isErr ? 'row-error' : '';
      const url        = trunc(w.url, 32) || '—';
      const target     = trunc(w.targetUrl, 32) || '—';
      const focus      = trunc(w.focus, 30) || '—';
      const proxy      = trunc(w.proxy || '—', 18);
      return `<tr id="wr-${w.id}" class="${cls}">
        <td>${w.id}</td>
        <td>${stateBadge(w.state)}</td>
        <td title="${esc(w.targetUrl)}">${esc(target)}</td>
        <td title="${esc(w.url)}">${esc(url)}</td>
        <td title="${esc(w.focus)}">${esc(focus)}</td>
        <td>${netBadge(w.lastNet)}</td>
        <td>${esc(proxy)}</td>
        <td class="acts">
          <button onclick="cmd('START',${w.id})">START</button>
          <button onclick="cmd('STOP',${w.id})">STOP</button>
          <button onclick="cmd('REFRESH',${w.id})">REFRESH</button>
          <button onclick="cmd('CLICK_PRIMARY',${w.id})">CLICK</button>
          <button onclick="cmd('FOCUS',${w.id})">FOCUS</button>
          <button class="btn-danger" onclick="destroyW(${w.id})">DESTROY</button>
        </td>
      </tr>`;
    }

    function resetTable() {
      document.getElementById('wtbody').innerHTML =
        '<tr id="empty-row"><td class="empty-td" colspan="8">no workers spawned — click SPAWN ALL to begin</td></tr>';
    }

    function upsertRow(w) {
      const tbody = document.getElementById('wtbody');
      const empty = document.getElementById('empty-row');
      if (empty) empty.remove();
      const existing = document.getElementById(`wr-${w.id}`);
      if (existing) { existing.outerHTML = rowHtml(w); return; }
      const rows = [...tbody.querySelectorAll('tr[id^="wr-"]')];
      const after = rows.find(r => parseInt(r.id.slice(3)) > w.id);
      if (after) after.insertAdjacentHTML('beforebegin', rowHtml(w));
      else        tbody.insertAdjacentHTML('beforeend',  rowHtml(w));
    }

    function removeRow(id) {
      const row = document.getElementById(`wr-${id}`);
      if (row) row.remove();
      if (workers.size === 0) resetTable();
    }

    /* ── Summary ── */
    function renderSummary() {
      const counts = {};
      for (const w of workers.values()) counts[w.state] = (counts[w.state] || 0) + 1;
      const el = document.getElementById('summary');
      const entries = Object.entries(counts);
      if (!entries.length) { el.innerHTML = '<span class="no-workers">no workers</span>'; return; }
      el.innerHTML = entries.map(([s, n]) =>
        `<span style="color:${SC[s]||'#888'}">${s}: ${n}</span>`
      ).join('<span class="sum-sep"> | </span>');
    }

    /* ── Checkout alerts ── */
    function renderAlerts() {
      const outs = [...workers.values()].filter(w => CHECKOUT_STATES.has(w.state));
      const bar  = document.getElementById('checkout-alert');
      if (outs.length) {
        bar.style.display = 'block';
        bar.textContent = outs.map(w => `WORKER ${w.id} IS IN CHECKOUT — ACT NOW`).join('  |  ');
      } else {
        bar.style.display = 'none';
      }
    }

    /* ── Log panel ── */
    function addLog(entry) {
      logTotal++;
      const panel   = document.getElementById('log-panel');
      const atBot   = panel.scrollHeight - panel.scrollTop - panel.clientHeight < 60;
      const isWorker = entry.scope.startsWith('worker');
      const sClass   = isWorker ? 'lsw' : 'lss';
      const line     = document.createElement('div');
      line.className = 'log-line';
      line.innerHTML =
        `<span class="lt">${hhmm(entry.ts)}</span> ` +
        `<span class="${sClass}">[${esc(entry.scope)}]</span> ` +
        `<span class="lm">${esc(entry.message)}</span>`;
      panel.appendChild(line);
      if (atBot) panel.scrollTop = panel.scrollHeight;
      document.getElementById('log-count').textContent = logTotal + ' entries';
    }

    function clearLogs() {
      logTotal = 0;
      document.getElementById('log-panel').innerHTML = '';
      document.getElementById('log-count').textContent = '';
    }

    /* ── Commands ── */
    async function cmd(command, workerId) {
      await fetch('/cmd', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ command, workerId }),
      }).catch(() => {});
    }
    async function cmdAll(command) {
      await fetch('/cmd', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ command }),
      }).catch(() => {});
    }

    async function spawnAll() {
      await fetch('/spawn-all', { method: 'POST' }).catch(() => {});
    }

    async function spawnN() {
      const count = parseInt(document.getElementById('spawn-count').value) || 1;
      const url   = document.getElementById('spawn-url').value.trim();
      const body  = { count };
      if (url) body.targetUrl = url;
      await fetch('/spawn', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      }).catch(() => {});
    }

    async function destroyW(id) {
      await fetch('/destroy', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ workerId: id }),
      }).catch(() => {});
    }

    /* ── Config ── */
    async function loadConfig() {
      try {
        const r = await fetch('/config');
        document.getElementById('cfg-ta').value = JSON.stringify(await r.json(), null, 2);
      } catch(e) { alert('Load failed: ' + e); }
    }

    async function saveConfig() {
      try {
        const patch = JSON.parse(document.getElementById('cfg-ta').value);
        const r = await fetch('/config', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(patch),
        });
        if (!r.ok) throw new Error('HTTP ' + r.status);
      } catch(e) { alert('Save failed: ' + e); }
    }

    /* ── Boot ── */
    connect();
  </script>
</body>
</html>
